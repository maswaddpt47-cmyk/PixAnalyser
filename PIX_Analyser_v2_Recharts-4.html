<script>
// htm setup — zéro compilation, pas de Babel
const html = htm.bind(React.createElement);
const { useState, useEffect, useCallback, useRef } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, RadarChart, Radar, PolarGrid, PolarAngleAxis,
  PieChart, Pie, Cell, LabelList
} = Recharts;

// ── CONSTANTES ────────────────────────────────────────────────────────────
const PCOL = ["#f87171","#fb923c","#4f8ef7","#34d399"];
const PLIB = ["Très débutant","Débutant","Intermédiaire","Avancé"];
const DCOL = ["#4f8ef7","#34d399","#a78bfa","#fb923c","#f472b6"];
const C    = {blue:"#4f8ef7",green:"#34d399",yellow:"#fbbf24",
              orange:"#fb923c",red:"#f87171",purple:"#a78bfa"};
const COMP_FIELDS = [
  {c:"Recherche",    f:"Pct_Recherche"},
  {c:"Interagir",    f:"Pct_Interagir"},
  {c:"S'insérer",    f:"Pct_Inserer"},
  {c:"Docs textuels",f:"Pct_Docs"},
  {c:"Sécuriser",    f:"Pct_Securiser"},
  {c:"Résoudre",     f:"Pct_Resoudre"},
  {c:"Construire",   f:"Pct_Construire"},
];
const DOM_FIELDS = [
  {d:"Information",   f:"Pct_Information"},
  {d:"Communication", f:"Pct_Communication"},
  {d:"Création",      f:"Pct_Creation"},
  {d:"Protection",    f:"Pct_Protection"},
  {d:"Environnement", f:"Pct_Environnement"},
];

// ── CSV PARSER ─────────────────────────────────────────────────────────────
const COLMAP = [
  [c => c.toLowerCase().includes("email"),                                      "Email"],
  [c => c.includes("organisation"),                                             "Organisation"],
  [c => c.includes("Nom de la campagne"),                                       "Nom_Campagne"],
  [c => c.includes("Nom du Participant"),                                       "Nom"],
  [c => (c.includes("rénom")||c.includes("renom")) && c.includes("articipant"),"Prenom"],
  [c => c.includes("rogression") && c.startsWith("%"),                          "Pct_Progression"],
  [c => (c.includes("but")||c.includes("début")) && c.includes("uro"),          "Date_Debut"],
  [c => c.includes("artage") && c.includes("O/N"),                              "Partage"],
  [c => c.includes("alier") && c.includes("/3"),                                "Palier"],
  [c => c.includes("ensemble des acquis"),                                      "Score_Global"],
  [c => c.includes("recherche")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Recherche"],
  [c => c.includes("Interagir")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Interagir"],
  [c => (c.includes("nsérer")||c.includes("nserer"))&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Inserer"],
  [c => c.includes("textuels")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Docs"],
  [c => (c.includes("écuriser")||c.includes("ecuriser"))&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Securiser"],
  [c => (c.includes("ésoudre")||c.includes("esoudre"))&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Resoudre"],
  [c => c.includes("Construire")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Construire"],
  [c => c.includes("Information")&&c.includes("données")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Information"],
  [c => c.includes("Communication")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Communication"],
  [c => (c.includes("réation")||c.includes("reation"))&&c.includes("contenu")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Creation"],
  [c => c.includes("Protection")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Protection"],
  [c => c.includes("Environnement")&&c.includes("numérique")&&c.includes("%")&&!c.includes("Nombre")&&!c.includes("Acquis"),"Pct_Environnement"],
];

function mapCol(name){
  const n=name.replace(/\u2019/g,"'").replace(/\u2018/g,"'");
  for(const [test,mapped] of COLMAP){ if(test(n)) return mapped; }
  return null;
}

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const first=text.split("\n")[0];
  const sep=first.split(";").length>first.split(",").length?";":","  ;
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  function parseLine(l){
    const cells=[]; let cur="",inQ=false;
    for(let i=0;i<l.length;i++){
      if(l[i]==='"'){inQ=!inQ;}
      else if(l[i]===sep&&!inQ){cells.push(cur.trim());cur="";}
      else cur+=l[i];
    }
    cells.push(cur.trim());
    return cells;
  }
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim());
  const colIdx={};
  headers.forEach((h,i)=>{const m=mapCol(h);if(m)colIdx[m]=i;});
  return lines.slice(1).map(line=>{
    const cells=parseLine(line);
    if(cells.length<3) return null;
    const get=k=>colIdx[k]!=null?(cells[colIdx[k]]||"").replace(/^"|"$/g,"").trim():"";
    const num=v=>{const n=parseFloat(v.replace(",","."));return isNaN(n)?null:n;};
    const email=get("Email");
    if(!email||email==="Votre Email") return null;
    return {
      Email:email,Nom:get("Nom"),Prenom:get("Prenom"),
      Nom_Campagne:get("Nom_Campagne"),Date_Debut:get("Date_Debut"),
      Palier:parseInt(get("Palier"))||0,
      Score_Global:num(get("Score_Global")),
      Pct_Recherche:num(get("Pct_Recherche")),Pct_Interagir:num(get("Pct_Interagir")),
      Pct_Inserer:num(get("Pct_Inserer")),Pct_Docs:num(get("Pct_Docs")),
      Pct_Securiser:num(get("Pct_Securiser")),Pct_Resoudre:num(get("Pct_Resoudre")),
      Pct_Construire:num(get("Pct_Construire")),
      Pct_Information:num(get("Pct_Information")),Pct_Communication:num(get("Pct_Communication")),
      Pct_Creation:num(get("Pct_Creation")),Pct_Protection:num(get("Pct_Protection")),
      Pct_Environnement:num(get("Pct_Environnement")),
    };
  }).filter(Boolean);
}

function parseDate(str){
  if(!str) return null; str=str.trim();
  const m1=str.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m1) return new Date(`${m1[3]}-${m1[2]}-${m1[1]}T00:00:00`);
  const m2=str.match(/^(\d{4}-\d{2}-\d{2})/);
  if(m2) return new Date(m2[1]);
  return null;
}

function processFiles(files){
  const data=[];
  files.forEach(f=>{
    const partenaire=f.partenaire||"(sans nom)";
    const byEmail={};
    f.rows.forEach(row=>{
      if(!row.Email) return;
      if(!byEmail[row.Email]) byEmail[row.Email]=[];
      byEmail[row.Email].push(row);
    });
    Object.entries(byEmail).forEach(([email,sessions])=>{
      sessions.sort((a,b)=>{
        const da=parseDate(a.Date_Debut),db=parseDate(b.Date_Debut);
        if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db;
      });
      const t1=sessions[0],t2=sessions.length>1?sessions[sessions.length-1]:null;
      let duree=null;
      if(t1&&t2){const d1=parseDate(t1.Date_Debut),d2=parseDate(t2.Date_Debut);
        if(d1&&d2) duree=Math.round((d2-d1)/(1000*60*60*24));}
      data.push({...t1,TypeCampagne:"Entrée",Partenaire:partenaire,NbSessions:sessions.length,Duree:duree});
      if(t2) data.push({...t2,TypeCampagne:"Sortie",Partenaire:partenaire,NbSessions:sessions.length,Duree:duree});
    });
  });
  return data;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const pct=v=>v!=null?Math.round(v*100)+"%":"—";
const r=v=>v!=null?Math.round(v*100):0;
const avg=a=>a.length?a.reduce((s,b)=>s+b,0)/a.length:0;
const nn=a=>a.filter(v=>v!=null);

function filter(data,curP,type){
  return data.filter(d=>(curP==="Tous"||d.Partenaire===curP)&&(type?d.TypeCampagne===type:true));
}

// ── TOOLTIP RECHARTS ──────────────────────────────────────────────────────
function Tip({active,payload,label}){
  if(!active||!payload||!payload.length) return null;
  return html`<div style=${{background:"rgba(22,27,39,.97)",border:"1px solid #3a4560",
    borderRadius:8,padding:"8px 12px",fontSize:12,fontFamily:"DM Sans,sans-serif"}}>
    <div style=${{color:"#e8edf5",fontWeight:600,marginBottom:4}}>${label}</div>
    ${payload.map((p,i)=>html`<div key=${i} style=${{color:p.color,display:"flex",gap:8,alignItems:"center"}}>
      <span style=${{width:8,height:8,borderRadius:2,background:p.color,display:"inline-block"}}/>
      <span style=${{color:"#8b97b0"}}>${p.name} :</span>
      <span style=${{fontWeight:600,color:"#e8edf5"}}>${p.value}%</span>
    </div>`)}
  </div>`;
}

// ── KPI CARD ──────────────────────────────────────────────────────────────
function KPI({label,value,sub,color=C.blue}){
  return html`<div className="kc" style=${{borderTopColor:color}}>
    <div className="kl">${label}</div>
    <div className="kv" style=${{color,fontSize:typeof value==="string"&&value.length>5?18:22}}>${value}</div>
    ${sub&&html`<div className="ks">${sub}</div>`}
  </div>`;
}

// ── PAGE 1 ────────────────────────────────────────────────────────────────
function P1({data,curP}){
  const e1=filter(data,curP,"Entrée"),e2=filter(data,curP,"Sortie");
  const mE=e1.length?avg(nn(e1.map(d=>d.Score_Global))):null;
  const mS=e2.length?avg(nn(e2.map(d=>d.Score_Global))):null;
  const pr=mE&&mS?mS-mE:null;
  const durees=e1.filter(d=>d.Duree!=null).map(d=>d.Duree);
  const mD=durees.length?Math.round(avg(durees)):null;
  const parts=[...new Set(data.map(d=>d.Partenaire))];
  const barData=parts.map(p=>({
    name:p.length>11?p.slice(0,11)+"…":p,
    "T1":r(avg(nn(data.filter(d=>d.Partenaire===p&&d.TypeCampagne==="Entrée").map(d=>d.Score_Global)))),
    "T2":r(avg(nn(data.filter(d=>d.Partenaire===p&&d.TypeCampagne==="Sortie").map(d=>d.Score_Global)))),
  }));
  const palData=[0,1,2,3].map(n=>({name:PLIB[n],value:e1.filter(d=>d.Palier===n).length,color:PCOL[n]})).filter(d=>d.value>0);
  return html`<div>
    <div className="ph"><h2>Vue d'ensemble</h2>
      <p>${curP==="Tous"?"Tous les partenaires":curP} · ${e1.length} participants T1 · ${e2.length} avec T2</p></div>
    <div className="krow">
      <${KPI} label="👥 Participants" value=${e1.length} sub="${e2.length} avec T2" color=${C.blue}/>
      <${KPI} label="📊 Maîtrise T1" value=${pct(mE)} sub="Score moyen entrée" color=${C.yellow}/>
      <${KPI} label="🎯 Maîtrise T2" value=${pct(mS)} sub="Score moyen sortie" color=${C.green}/>
      <${KPI} label="📈 Progression" value=${pr!=null?(pr>0?"+":"")+pct(pr):"—"} sub="T2 − T1" color=${pr>0?C.green:C.red}/>
      <${KPI} label="🗓️ Durée moy." value=${mD!=null?mD+"j":"—"} sub="Entre T1 et T2" color=${C.purple}/>
    </div>
    <div className="g2">
      <div className="gc">
        <div className="gt">Score moyen par partenaire (%)</div>
        <${ResponsiveContainer} width="100%" height=${200}>
          <${BarChart} data=${barData} margin=${{top:4,right:8,left:-20,bottom:0}}>
            <${CartesianGrid} strokeDasharray="3 3" stroke="#2a3347" vertical=${false}/>
            <${XAxis} dataKey="name" tick=${{fill:"#8b97b0",fontSize:10}}/>
            <${YAxis} domain=${[0,100]} tick=${{fill:"#8b97b0",fontSize:10}} tickFormatter=${v=>v+"%"}/>
            <${Tooltip} content=${Tip}/>
            <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
            <${Bar} dataKey="T1" fill=${C.yellow} radius=${[4,4,0,0]} maxBarSize=${30}/>
            <${Bar} dataKey="T2" fill=${C.green}  radius=${[4,4,0,0]} maxBarSize=${30}/>
          <//>
        <//>
      </div>
      <div className="gc">
        <div className="gt">Distribution paliers T1</div>
        <${ResponsiveContainer} width="100%" height=${200}>
          <${PieChart}>
            <${Pie} data=${palData} cx="45%" cy="50%" innerRadius=${50} outerRadius=${80}
              dataKey="value" paddingAngle=${3}>
              ${palData.map((d,i)=>html`<${Cell} key=${i} fill=${d.color}/>`)}
            <//>
            <${Tooltip} formatter=${(v,n)=>[v+" participant"+(v>1?"s":""),n]}/>
            <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
          <//>
        <//>
      </div>
    </div>
  </div>`;
}

// ── PAGE 2 ────────────────────────────────────────────────────────────────
function P2({data,curP}){
  const e1=filter(data,curP,"Entrée"),e2=filter(data,curP,"Sortie");
  const compData=COMP_FIELDS.map(({c,f})=>({
    name:c,
    "T1":e1.length?r(avg(nn(e1.map(d=>d[f])))):0,
    "T2":e2.length?r(avg(nn(e2.map(d=>d[f])))):0,
    prog:e2.length?r(avg(nn(e2.map(d=>d[f]))))-r(avg(nn(e1.map(d=>d[f])))):0,
  }));
  return html`<div>
    <div className="ph"><h2>Compétences PIX</h2><p>7 compétences · T1 vs T2</p></div>
    <div className="gc" style=${{marginBottom:12}}>
      <div className="gt">Maîtrise par compétence (%)</div>
      <${ResponsiveContainer} width="100%" height=${260}>
        <${BarChart} data=${compData} layout="vertical" margin=${{top:4,right:40,left:74,bottom:0}}>
          <${CartesianGrid} strokeDasharray="3 3" stroke="#2a3347" horizontal=${false}/>
          <${XAxis} type="number" domain=${[0,100]} tick=${{fill:"#8b97b0",fontSize:10}} tickFormatter=${v=>v+"%"}/>
          <${YAxis} type="category" dataKey="name" tick=${{fill:"#8b97b0",fontSize:10}} width=${74}/>
          <${Tooltip} content=${Tip}/>
          <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
          <${Bar} dataKey="T1" fill=${C.yellow} radius=${[0,4,4,0]} maxBarSize=${14}/>
          <${Bar} dataKey="T2" fill=${C.green}  radius=${[0,4,4,0]} maxBarSize=${14}/>
        <//>
      <//>
    </div>
    <div className="g2">
      <div className="ccards">
        ${compData.map((c,i)=>html`<div key=${i} className="ccard" style=${{borderLeft:"3px solid "+(c.prog>10?C.green:C.blue)}}>
          <div className="cn">${c.name}</div>
          <div className="cv" style=${{color:e2.length?C.green:"#4a566a"}}>${e2.length?c.T2+"%":"—"}</div>
          <div className="cs">vs ${c.T1}% T1 ${e2.length?html`<span style=${{color:C.green,fontWeight:600}}>+${c.prog} pts</span>`:" (pas de T2)"}</div>
        </div>`)}
      </div>
      <div className="gc">
        <div className="gt">Progression (pts)</div>
        <${ResponsiveContainer} width="100%" height=${260}>
          <${BarChart} data=${compData} layout="vertical" margin=${{top:4,right:40,left:74,bottom:0}}>
            <${CartesianGrid} strokeDasharray="3 3" stroke="#2a3347" horizontal=${false}/>
            <${XAxis} type="number" tick=${{fill:"#8b97b0",fontSize:10}} tickFormatter=${v=>"+"+v}/>
            <${YAxis} type="category" dataKey="name" tick=${{fill:"#8b97b0",fontSize:10}} width=${74}/>
            <${Tooltip} formatter=${v=>["+"+v+" pts","Progression"]}/>
            <${Bar} dataKey="prog" name="Progression" fill=${C.purple} radius=${[0,4,4,0]} maxBarSize=${14}>
              <${LabelList} dataKey="prog" position="right" formatter=${v=>"+"+v} style=${{fill:"#8b97b0",fontSize:9}}/>
            <//>
          <//>
        <//>
      </div>
    </div>
  </div>`;
}

// ── PAGE 3 ────────────────────────────────────────────────────────────────
function P3({data,curP}){
  const e1=filter(data,curP,"Entrée"),e2=filter(data,curP,"Sortie");
  const domData=DOM_FIELDS.map(({d,f})=>({
    name:d,
    "T1":e1.length?r(avg(nn(e1.map(x=>x[f])))):0,
    "T2":e2.length?r(avg(nn(e2.map(x=>x[f])))):0,
  }));
  const radarData=domData.map(d=>({subject:d.name,"T1 Entrée":d["T1"],"T2 Sortie":d["T2"]}));
  return html`<div>
    <div className="ph"><h2>Domaines PIX</h2><p>5 domaines · Progression T1 → T2</p></div>
    <div className="g2">
      <div className="gc">
        <div className="gt">Maîtrise T1 vs T2 (%)</div>
        <${ResponsiveContainer} width="100%" height=${230}>
          <${BarChart} data=${domData} margin=${{top:4,right:8,left:-20,bottom:0}}>
            <${CartesianGrid} strokeDasharray="3 3" stroke="#2a3347" vertical=${false}/>
            <${XAxis} dataKey="name" tick=${{fill:"#8b97b0",fontSize:9}}/>
            <${YAxis} domain=${[0,100]} tick=${{fill:"#8b97b0",fontSize:10}} tickFormatter=${v=>v+"%"}/>
            <${Tooltip} content=${Tip}/>
            <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
            <${Bar} dataKey="T1" fill=${C.yellow} radius=${[4,4,0,0]} maxBarSize=${28}/>
            <${Bar} dataKey="T2" fill=${C.green}  radius=${[4,4,0,0]} maxBarSize=${28}/>
          <//>
        <//>
      </div>
      <div className="gc">
        <div className="gt">Radar des 5 domaines</div>
        <${ResponsiveContainer} width="100%" height=${230}>
          <${RadarChart} data=${radarData}>
            <${PolarGrid} stroke="#2a3347"/>
            <${PolarAngleAxis} dataKey="subject" tick=${{fill:"#8b97b0",fontSize:9}}/>
            <${Radar} name="T1 Entrée" dataKey="T1 Entrée" stroke=${C.yellow} fill=${C.yellow} fillOpacity=${0.2}/>
            <${Radar} name="T2 Sortie" dataKey="T2 Sortie" stroke=${C.green}  fill=${C.green}  fillOpacity=${0.2}/>
            <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
            <${Tooltip} content=${Tip}/>
          <//>
        <//>
      </div>
    </div>
    <div className="gc" style=${{marginTop:12}}>
      <div className="gt">Tableau de synthèse</div>
      <table className="dt">
        <thead><tr><th>Domaine</th><th>Score T1</th><th>Score T2</th><th>Progression</th><th>Tendance</th></tr></thead>
        <tbody>${domData.map((d,i)=>{
          const pg=d["T2"]-d["T1"];
          return html`<tr key=${i}>
            <td style=${{fontWeight:500}}>${d.name}</td>
            <td style=${{color:C.yellow,fontWeight:600}}>${d["T1"]}%</td>
            <td style=${{color:C.green,fontWeight:600}}>${e2.length?d["T2"]+"%":"—"}</td>
            <td>${e2.length?html`<span className="badge bg">+${pg} pts</span>`:"—"}</td>
            <td style=${{color:C.green,letterSpacing:2}}>${e2.length?"▲".repeat(Math.ceil(pg/5)):""}</td>
          </tr>`;
        })}</tbody>
      </table>
    </div>
  </div>`;
}

// ── PAGE 4 ────────────────────────────────────────────────────────────────
function P4({data,curP}){
  const parts=filter(data,curP,"Entrée");
  const [email,setEmail]=useState(parts[0]?.Email||"");
  useEffect(()=>{
    const ps=filter(data,curP,"Entrée");
    if(ps.length&&!ps.find(p=>p.Email===email)) setEmail(ps[0]?.Email||"");
  },[curP,data]);
  const rowE=data.find(d=>d.Email===email&&d.TypeCampagne==="Entrée");
  const rowS=data.find(d=>d.Email===email&&d.TypeCampagne==="Sortie");
  if(!parts.length) return html`<div style=${{textAlign:"center",padding:60,color:"var(--text2)"}}>Aucun participant.</div>`;
  const compData=COMP_FIELDS.map(({c,f})=>({
    name:c,"T1":rowE?r(rowE[f]):0,...(rowS?{"T2":r(rowS[f])}:{})
  }));
  const prog=rowE&&rowS?r(rowS.Score_Global-rowE.Score_Global):null;
  const nom=rowE?(rowE.Prenom?rowE.Prenom+" "+rowE.Nom:rowE.Nom||rowE.Email):"";
  return html`<div>
    <div className="ph"><h2>Fiche individuelle</h2><p>Profil complet d'un participant</p></div>
    <div className="psel-w">
      <label>🔍 Sélectionner un participant</label>
      <select value=${email} onChange=${e=>setEmail(e.target.value)}>
        ${parts.map(p=>html`<option key=${p.Email} value=${p.Email}>
          ${p.Prenom?p.Prenom+" "+p.Nom:p.Nom||p.Email} — ${p.Partenaire}
        </option>`)}
      </select>
    </div>
    ${rowE&&html`<div>
      <div className="krow">
        <${KPI} label="📋 Score T1" value=${pct(rowE.Score_Global)} sub="Palier ${rowE.Palier}/3" color=${C.yellow}/>
        <${KPI} label="🏁 Score T2" value=${rowS?pct(rowS.Score_Global):"—"} sub=${rowS?"Palier "+rowS.Palier+"/3":"Pas encore"} color=${C.green}/>
        <${KPI} label="📈 Progression" value=${prog!=null?"+"+prog+" pts":"—"} sub="T2 − T1" color=${C.blue}/>
        <${KPI} label="🎓 Niveau T1" value=${PLIB[rowE.Palier]} sub=${rowS?"→ "+PLIB[rowS.Palier]+" (T2)":""} color=${PCOL[rowE.Palier]}/>
        ${rowE.NbSessions>1&&html`<${KPI} label="🔄 Sessions" value=${rowE.NbSessions} sub=${rowE.Duree!=null?"sur "+rowE.Duree+" jours":""} color=${C.orange}/>`}
      </div>
      <div className="gc">
        <div className="gt">Profil de compétences — ${nom}</div>
        <${ResponsiveContainer} width="100%" height=${230}>
          <${BarChart} data=${compData} margin=${{top:4,right:8,left:-20,bottom:0}}>
            <${CartesianGrid} strokeDasharray="3 3" stroke="#2a3347" vertical=${false}/>
            <${XAxis} dataKey="name" tick=${{fill:"#8b97b0",fontSize:9}}/>
            <${YAxis} domain=${[0,100]} tick=${{fill:"#8b97b0",fontSize:10}} tickFormatter=${v=>v+"%"}/>
            <${Tooltip} content=${Tip}/>
            <${Legend} iconSize=${10} wrapperStyle=${{fontSize:11}}/>
            <${Bar} dataKey="T1" fill=${C.yellow} radius=${[4,4,0,0]} maxBarSize=${24}/>
            ${rowS&&html`<${Bar} dataKey="T2" fill=${C.green} radius=${[4,4,0,0]} maxBarSize=${24}/>`}
          <//>
        <//>
      </div>
    </div>`}
  </div>`;
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("import");
  const [files,setFiles]=useState([]);
  const [data,setData]=useState([]);
  const [curP,setCurP]=useState("Tous");
  const [tab,setTab]=useState("t1");
  const [subtitle,setSubtitle]=useState("");
  const dropRef=useRef(null);

  const handleFiles=useCallback(fileList=>{
    Array.from(fileList).forEach(f=>{
      if(!f.name.endsWith(".csv")) return;
      const reader=new FileReader();
      reader.onload=e=>{
        const rows=parseCSV(e.target.result);
        const emails=new Set(rows.map(r=>r.Email));
        const avecT2=[...emails].filter(em=>rows.filter(r=>r.Email===em).length>1);
        setFiles(prev=>[...prev,{
          id:Date.now()+Math.random(),name:f.name,partenaire:"",rows,
          info:`${emails.size} participants · ${avecT2.length} avec T2`
        }]);
      };
      reader.readAsText(f,"utf-8");
    });
  },[]);

  const removeFile=id=>setFiles(prev=>prev.filter(f=>f.id!==id));
  const updatePart=(id,val)=>setFiles(prev=>prev.map(f=>f.id===id?{...f,partenaire:val}:f));

  const generate=()=>{
    const d=processFiles(files);
    if(!d.length){alert("Aucune donnée valide.");return;}
    setData(d);
    const nbT1=d.filter(r=>r.TypeCampagne==="Entrée").length;
    const nbT2=d.filter(r=>r.TypeCampagne==="Sortie").length;
    setSubtitle(`${files.length} campagne${files.length>1?"s":""} · ${nbT1} participants · ${nbT2} avec T2`);
    setCurP("Tous");setTab("t1");setScreen("dash");
  };

  const exportJSON=()=>{
    if(!data.length){alert("Aucune donnée.");return;}
    const parts=[...new Set(data.map(d=>d.Partenaire))];
    const nom=curP==="Tous"?parts.join("+"):curP;
    const date=new Date().toISOString().slice(0,10);
    const payload={version:"PIX_Analyser_v2",exported:new Date().toISOString(),
      partenaire:nom,fichiers:files.map(f=>({name:f.name,partenaire:f.partenaire})),
      stats:{nbT1:data.filter(d=>d.TypeCampagne==="Entrée").length,
             nbT2:data.filter(d=>d.TypeCampagne==="Sortie").length},data};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`PIX_${nom.replace(/[^a-zA-Z0-9]/g,"_")}_${date}.json`;
    a.click();URL.revokeObjectURL(a.href);
  };

  const importJSON=()=>{
    const input=document.createElement("input");
    input.type="file";input.accept=".json";
    input.onchange=e=>{
      const f=e.target.files[0];if(!f) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const p=JSON.parse(ev.target.result);
          if(!p.version||!p.data){alert("Fichier JSON invalide.");return;}
          setData(p.data);
          setFiles(p.fichiers.map(f=>({...f,id:Date.now()+Math.random(),rows:[],info:""})));
          const exported=new Date(p.exported).toLocaleDateString("fr-FR");
          setSubtitle(`${p.partenaire} · ${p.stats.nbT1} participants · Importé du ${exported}`);
          setCurP("Tous");setTab("t1");setScreen("dash");
        }catch(err){alert("Erreur JSON : "+err.message);}
      };
      reader.readAsText(f);
    };
    input.click();
  };

  const printDash=()=>{
    document.querySelectorAll(".pagesec").forEach(p=>p.style.display="block");
    setTimeout(()=>{
      window.print();
      setTimeout(()=>document.querySelectorAll(".pagesec").forEach(p=>p.style.display=""),500);
    },350);
  };

  // Drag & drop
  useEffect(()=>{
    const el=dropRef.current; if(!el) return;
    const over=e=>{e.preventDefault();el.classList.add("over");};
    const leave=()=>el.classList.remove("over");
    const drop=e=>{e.preventDefault();el.classList.remove("over");handleFiles(e.dataTransfer.files);};
    el.addEventListener("dragover",over);el.addEventListener("dragleave",leave);el.addEventListener("drop",drop);
    return()=>{el.removeEventListener("dragover",over);el.removeEventListener("dragleave",leave);el.removeEventListener("drop",drop);};
  },[handleFiles]);

  const partenaires=["Tous",...new Set(data.map(d=>d.Partenaire))];

  // ── IMPORT SCREEN ───────────────────────────────────────────────────────
  if(screen==="import") return html`<div className="import">
    <div className="brand-name">⚡ PIX Analyser v2</div>
    <div className="brand-sub">Département du Lot-et-Garonne · Médiation Numérique</div>
    <div className="drop" ref=${dropRef} onClick=${()=>document.getElementById("fi").click()}>
      <span style=${{fontSize:44,display:"block",marginBottom:14}}>📂</span>
      <h3>Dépose tes exports PIX ici</h3>
      <p>Un fichier CSV par campagne · T1 = première session · T2 = dernière</p>
      <button className="btn-up" onClick=${e=>{e.stopPropagation();document.getElementById("fi").click();}}>
        📤 Choisir des fichiers CSV
      </button>
      <input id="fi" type="file" accept=".csv" multiple style=${{display:"none"}}
        onChange=${e=>handleFiles(e.target.files)}/>
      <div style=${{marginTop:12,fontSize:12,color:"var(--text3)"}}>ou</div>
      <button className="btn-json" onClick=${e=>{e.stopPropagation();importJSON();}}>
        📂 Charger un JSON sauvegardé
      </button>
    </div>
    ${files.length>0&&html`<div className="flist">
      ${files.map((f,i)=>html`<div key=${f.id} className="fitem">
        <div className="fitem-top">
          <span className="fbadge">📊 Campagne</span>
          <span className="fname" title=${f.name}>${f.name}</span>
          <span className="frows">${f.info}</span>
          <button className="fdel" onClick=${()=>removeFile(f.id)}>×</button>
        </div>
        <div className="fitem-bot">
          <span className="plabel">Partenaire :</span>
          <input className="pinput" placeholder="Ex: Fumel Gr.1, Pôle Emploi…"
            value=${f.partenaire} onInput=${e=>updatePart(f.id,e.target.value)}/>
        </div>
      </div>`)}
    </div>`}
    ${files.length>0&&html`<button className="btn-gen" onClick=${generate}>⚡ Générer le dashboard</button>`}
    <p className="hint">Première session = T1 · Dernière session = T2 · Intermédiaires ignorés</p>
  </div>`;

  // ── DASHBOARD ───────────────────────────────────────────────────────────
  const tabs=[["t1","Vue d'ensemble"],["t2","Compétences"],["t3","Domaines"],["t4","Fiche individuelle"]];
  return html`<div className="dash">
    <div className="dhdr">
      <span className="d-logo">⚡ PIX Analyser v2</span>
      <div className="d-sep"/>
      <span className="d-sub">${subtitle}</span>
      <div className="d-right">
        <select className="d-sel" value=${curP} onChange=${e=>setCurP(e.target.value)}>
          ${partenaires.map(p=>html`<option key=${p}>${p}</option>`)}
        </select>
        <button className="d-btn" onClick=${printDash}>🖨️ PDF</button>
        <button className="d-btn" onClick=${exportJSON}>💾 JSON</button>
        <button className="d-btn" onClick=${importJSON}>📂 Import</button>
        <button className="d-btn" onClick=${()=>setScreen("import")}>← Import</button>
      </div>
    </div>
    <div className="dtabs">
      ${tabs.map(([id,label])=>html`<button key=${id}
        className=${"dtab"+(tab===id?" on":"")} onClick=${()=>setTab(id)}>${label}</button>`)}
    </div>
    <div className="dct">
      ${tabs.map(([id])=>html`<div key=${id} className="pagesec" style=${{display:tab===id?"block":"none"}}>
        ${id==="t1"&&html`<${P1} data=${data} curP=${curP}/>`}
        ${id==="t2"&&html`<${P2} data=${data} curP=${curP}/>`}
        ${id==="t3"&&html`<${P3} data=${data} curP=${curP}/>`}
        ${id==="t4"&&html`<${P4} data=${data} curP=${curP}/>`}
      </div>`)}
    </div>
  </div>`;
}

// Lancer l'app
function startApp(){
  if(typeof htm === "undefined" || typeof Recharts === "undefined" || typeof React === "undefined"){
    document.getElementById("root").innerHTML =
      '<div style="color:#f87171;padding:40px;text-align:center;font-family:sans-serif">' +
      '<div style="font-size:32px;margin-bottom:16px">⚠️</div>' +
      '<strong>Connexion internet requise</strong><br><br>' +
      'Cette version utilise Recharts (CDN).<br>' +
      'Vérifie ta connexion et recharge la page.' +
      '</div>';
    return;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
}

// Attendre que tous les scripts CDN soient chargés
if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", startApp);
} else {
  startApp();
}
</script>
</body>
</html>
